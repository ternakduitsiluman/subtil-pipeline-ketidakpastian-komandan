name: Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 * * * *'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add sdkmanager to PATH
        run: |
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Decode signing keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          mkdir -p signing
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > signing/harutaka-release.jks

      - name: Create keystore.properties
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          cat <<EOF > keystore.properties
          storeFile=signing/harutaka-release.jks
          storePassword=${KEYSTORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          EOF

      - name: Build Release APK
        run: ./gradlew --no-daemon clean assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: takatagit-release-apk-linux
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/release/output-metadata.json
