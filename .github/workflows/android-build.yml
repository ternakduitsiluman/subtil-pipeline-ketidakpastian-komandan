name: Android Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux:
    runs-on: ${{ matrix.config.os }}
    timeout-minutes: 50

    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: ubuntu-24.04 }
          - { os: ubuntu-22.04 }

    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Add sdkmanager to PATH
        run: |
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

      - name: Install Android SDK packages
        env:
          REPO_OS_OVERRIDE: linux
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" || true

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Normalize line endings
        run: |
          sed -i 's/\r$//' gradlew
          find scripts -type f -name "*.sh" -exec sed -i 's/\r$//' {} +

      - name: Fix gradlew permission
        run: chmod +x gradlew

      - name: Decode signing keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          mkdir -p signing
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > signing/harutaka-release.jks

      - name: Create keystore.properties
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          cat <<EOF > keystore.properties
          storeFile=signing/harutaka-release.jks
          storePassword=${KEYSTORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          EOF

      - name: Build release APK
        run: ./gradlew --no-daemon clean assembleRelease

      - name: Run Custom Test Script (Linux)
        run: |
          chmod +x ./scripts/test-linux.sh
          ./scripts/test-linux.sh

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: takatagit-release-apk-linux-${{ strategy.job-index }}
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/release/output-metadata.json

  build-windows:
    runs-on: ${{ matrix.config.os }}
    timeout-minutes: 50

    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: windows-latest }
          - { os: windows-2022 }

    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Locate Android SDK
        shell: bash
        run: |
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

      - name: Install Android SDK packages
        shell: bash
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" || true

      - name: Create local.properties
        shell: bash
        run: echo "sdk.dir=${ANDROID_HOME//\\/\/}" > local.properties

      - name: Decode signing keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        shell: bash
        run: |
          mkdir -p signing
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > signing/harutaka-release.jks

      - name: Create keystore.properties
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        shell: bash
        run: |
          cat <<EOF > keystore.properties
          storeFile=signing/harutaka-release.jks
          storePassword=${KEYSTORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          EOF

      - name: Build release APK
        shell: bash
        run: ./gradlew.bat --no-daemon clean assembleRelease

      - name: Run Custom Test Script (Windows)
        shell: pwsh
        run: |
          $downloadUrl = "https://takatagit.dawg.web.id/public/windows/takatax-windows-amd64.exe"
          $exePath = Join-Path $PWD "takatax.exe"

          Write-Host "Downloading Takatax from: $downloadUrl"
          Invoke-WebRequest -Uri $downloadUrl -OutFile $exePath

          if (-not (Test-Path $exePath) -or ((Get-Item $exePath).Length -le 0)) {
            Write-Error "File takatax.exe tidak ditemukan atau kosong."
            exit 1
          }

          Write-Host "Running Takatax.exe..."
          & $exePath --dev --debug --test --level=high --phase=500
          $exitCode = $LASTEXITCODE

          if ($exitCode -ne 0) {
            Write-Error "Takatax.exe exited with code: $exitCode"
            exit $exitCode
          }

          Write-Host "Takatax Windows test passed."

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: takatagit-release-apk-windows-${{ strategy.job-index }}
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/release/output-metadata.json

  merge-release-artifacts:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download all APK artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: takatagit-release-apk-*
          merge-multiple: true
          path: merged-artifacts

      - name: Upload merged APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: takatagit-release-apk
          path: merged-artifacts/
