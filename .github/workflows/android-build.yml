name: Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 * * * *'

jobs:
  build-linux:
    runs-on: ${{ matrix.config.os }}
    timeout-minutes: 40
    strategy:
      matrix:
        config:
          - { os: ubuntu-24.04, artifact_name: takatagit-release-apk-ubuntu-24.04-amd64 }
          - { os: ubuntu-24.04-arm, artifact_name: takatagit-release-apk-ubuntu-24.04-arm64 }
          - { os: ubuntu-22.04, artifact_name: takatagit-release-apk-ubuntu-22.04-amd64 }
          - { os: ubuntu-22.04-arm, artifact_name: takatagit-release-apk-ubuntu-22.04-arm64 }

    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Add sdkmanager to PATH
        run: |
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Fix gradlew permission
        run: chmod +x gradlew

      - name: Decode signing keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          mkdir -p signing
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > signing/harutaka-release.jks

      - name: Create keystore.properties
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          cat <<EOF > keystore.properties
          storeFile=signing/harutaka-release.jks
          storePassword=${KEYSTORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          EOF

      - name: Build release APK
        run: ./gradlew --no-daemon clean assembleRelease

      - name: Run custom test script (Linux)
        run: |
          sed -i 's/\r$//' ./scripts/test-linux.sh
          chmod +x ./scripts/test-linux.sh
          ./scripts/test-linux.sh

      - name: Upload release APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config.artifact_name }}
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/release/output-metadata.json
          if-no-files-found: error
