name: Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 */1 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build-linux:
    runs-on: ${{ matrix.config.os }}
    timeout-minutes: 40

    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: ubuntu-24.04, c: gcc-14, cpp: g++-14 }
          - { os: ubuntu-22.04, c: gcc-14, cpp: g++-14 }

    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize line endings
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          find . -type f -name "*.sh" -exec sed -i 's/\r$//' {} +

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: ""

      - name: Add sdkmanager to PATH
        run: |
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Decode signing keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          mkdir -p signing
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > signing/harutaka-release.jks

      - name: Build release APK
        shell: bash
        run: ./gradlew --no-daemon clean assembleRelease
      
      - name: Run Custom Test Script (Linux)
        run: |
          chmod +x ./scripts/test-linux.sh
          ./scripts/test-linux.sh

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: takatagit-release-apk-${{ matrix.config.os }}
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/release/output-metadata.json


  build-windows:
    runs-on: ${{ matrix.config.os }}
    timeout-minutes: 50

    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: windows-latest }
          - { os: windows-2022 }

    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize line endings
        shell: bash
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          find . -type f -name "*.sh" -exec sed -i 's/\r$//' {} +

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build release APK
        shell: bash
        run: ./gradlew.bat --no-daemon clean assembleRelease

      - name: Run Custom Test Script (Windows)
        shell: bash
        run: |
          sed -i 's/\r$//' ./scripts/test-windows.sh
          chmod +x ./scripts/test-windows.sh
          bash ./scripts/test-windows.sh

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: takatagit-release-apk-${{ matrix.config.os }}
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/release/output-metadata.json


  merge-release-artifacts:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Merge artifacts
        uses: actions/upload-artifact/merge@v4
        with:
          name: takatagit-release-apk
          pattern: takatagit-release-apk-*
          delete-merged: true